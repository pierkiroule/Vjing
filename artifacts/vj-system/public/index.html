<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VJ Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      font-family: monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">VJ PLAYER — /control to open controller</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script src="audioManager.js"></script>
  <script src="videoManager.js"></script>
  <script src="scenes/audioReactiveScene.js"></script>
  <script src="scenes/videoDisplayScene.js"></script>
  <script src="scenes/liveCameraScene.js"></script>
  <script src="scenes/particleFieldScene.js"></script>
  <script src="scenes/tunnelScene.js"></script>
  <script src="scenes/gridWaveScene.js"></script>
  <script src="sceneManager.js"></script>
  <script src="main.js"></script>
</body>
</html>
